<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XI 風 サイコロパズル</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="hud">
    <div class="row"><span class="label">SCORE</span><span id="score">0</span></div>
    <div class="row"><span class="label">DICE</span><span id="count">0</span></div>
    <div class="row"><span class="label">CHAIN</span><span id="chain">0</span></div>
    <div class="row"><span class="label">LINK</span><span id="link">0</span></div>
  </div>

  <div id="help">
    <b>操作（アクイを動かす）</b><br />
    ← ↑ → ↓ : 移動（1マス）<br />
    Space : 持ち上げ / 設置<br />
    Z / Shift : ジャンプ（サイコロごと）<br />
    <span class="dim">上に乗ってる時 … 空きへ転がす / 同じ高さの隣へ乗り移る</span><br />
    <span class="dim">床にいる時 … 前のダイスを押す（先が1段なら2段に積む）</span><br />
    <span class="dim">段を登る・2段の上へは ジャンプ で（空中で矢印→隣の上に積む）</span><br />
    <span class="dim">Space … 前のダイスを持ち上げ → 向いた先（上にも）へ置く</span><br />
    <span class="dim">最上段で同じ目を「目の数」以上つなげると消える</span><br />
    <span class="warn">床からダイスがせり上がる！埋まる前に消せ</span>
  </div>

  <div id="log"></div>

  <div id="message" class="hidden"></div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
